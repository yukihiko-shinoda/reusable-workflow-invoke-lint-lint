name: Lint
on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: '3.14'
      enable-xenon:
        type: boolean
        default: false
jobs:
  check_style:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Advanced Security suggested for Principle of Least Privilege in pull request review
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ inputs.python-version }}
      - run: uv sync
      - run: uv run invoke style --check
  check_lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Advanced Security suggested for Principle of Least Privilege in pull request review
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ inputs.python-version }}
      - run: uv sync
      - run: uv run invoke lint ${{ inputs.enable-xenon == true && '--xenon' || '' }}
  check_lint_deep:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Advanced Security suggested for Principle of Least Privilege in pull request review
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ inputs.python-version }}
      - run: uv sync
      - run: uv run invoke lint.deep
